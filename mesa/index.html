<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mesa de Originação | Prata Real Estate</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- /mesa/index.html -->

    <a href="/" class="back-link">← Voltar ao site</a>

    <header class="main-header">
        <div class="header-top">
            <span>PRATA REAL ESTATE | SPECIAL SITUATIONS</span>
        </div>
        <h1 class="page-title">Mesa de Originação</h1>
        <p class="subtitle" id="asset-count">Exibindo 0 teses estruturadas.</p>
    </header>

    <section class="filters-section">
        <div class="filters">
            <input type="text" id="city-filter" placeholder="Cidade...">
            <select id="state-filter">
                <option value="">Estados</option>
            </select>
            <label class="checkbox-label">
                <input type="checkbox" id="qualified-filter">
                Filtro Qualificado (+300k)
            </label>
        </div>
    </section>

    <main class="assets-section">
        <div class="loading" id="loading-area">
            <p>Sincronizando base de ativos...</p>
        </div>
        <div class="assets-grid" id="assets-grid">
            <!-- Ativos serão populados pelo app.js -->
        </div>
    </main>

    <!-- Modal de Acesso -->
    <div class="modal-overlay" id="modal-overlay"></div>
    <div class="modal" id="access-modal">
        <div class="modal-content">
            <h2>Protocolo de Acesso</h2>
            <p class="modal-text">
                Esta tese jurídica é exclusiva e confidencial. Para acessar os dados completos,
                é necessário assinar um NDA.
            </p>
            <div class="code-block">
                <label>Código do Ativo para o Formulário:</label>
                <div class="code-container">
                    <span id="asset-code" class="code-value"></span>
                    <button id="copy-btn">Copiar</button>
                </div>
            </div>
            <div class="modal-buttons">
                <button id="nda-btn" class="nda-button">Assinar NDA e Acessar Dados</button>
                <button id="back-btn">Voltar para a Mesa</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
