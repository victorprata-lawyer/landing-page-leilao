<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mesa de Originação Jurídica</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0c10;
            --dark: #1a1c22;
            --gold: #c6a85a;
            --gold-dark: #a68a40;
            --text: #ffffff;
            --text-muted: #cccccc;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }
        h1, h2, h3 {
            font-family: 'Playfair Display', serif;
        }
        header {
            padding: 1rem 2rem;
            background: var(--dark);
            display: flex;
            align-items: center;
        }
        .back-btn {
            background: none;
            border: 2px solid var(--gold);
            color: var(--gold);
            padding: 0.5rem 1rem;
            border-radius: 5px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 500;
            transition: all 0.3s;
        }
        .back-btn:hover {
            background: var(--gold);
            color: var(--bg);
        }
        .hero {
            text-align: center;
            padding: 4rem 2rem;
        }
        .hero-title {
            font-size: 3rem;
            color: var(--gold);
            margin-bottom: 1rem;
        }
        .hero-desc {
            font-size: 1.2rem;
            max-width: 600px;
            margin: 0 auto;
            opacity: 0.9;
        }
        .filters {
            display: flex;
            gap: 1rem;
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
            flex-wrap: wrap;
        }
        select {
            padding: 0.75rem 1rem;
            border: 2px solid var(--gold);
            background: var(--dark);
            color: var(--text);
            border-radius: 5px;
            font-family: inherit;
            font-size: 1rem;
        }
        select option {
            background: var(--dark);
            color: var(--text);
        }
        .filter-btn {
            padding: 0.75rem 1.5rem;
            background: var(--gold);
            color: var(--bg);
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
            font-family: inherit;
            font-size: 1rem;
        }
        .filter-btn:hover {
            background: var(--gold-dark);
            transform: translateY(-2px);
        }
        .counter {
            text-align: center;
            padding: 1.5rem 2rem;
            background: var(--dark);
            color: var(--gold);
            font-weight: 500;
            font-size: 1.1rem;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 2rem;
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }
        .card {
            background: var(--dark);
            border: 2px solid transparent;
            border-radius: 10px;
            padding: 2rem;
            transition: all 0.3s;
        }
        .card:hover {
            border-color: var(--gold);
            box-shadow: 0 10px 30px rgba(198, 168, 90, 0.3);
            transform: translateY(-5px);
        }
        .card h3 {
            color: var(--gold);
            margin-bottom: 1rem;
            font-size: 1.5rem;
        }
        .card p {
            margin-bottom: 1rem;
            color: var(--text-muted);
        }
        .card .meta {
            display: flex;
            gap: 1rem;
            font-size: 0.95rem;
            color: var(--gold);
            margin-bottom: 1.5rem;
        }
        .access-btn {
            width: 100%;
            background: var(--gold);
            color: var(--bg);
            border: none;
            padding: 0.75rem;
            border-radius: 5px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
        }
        .access-btn:hover {
            background: var(--gold-dark);
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 12, 16, 0.9);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: var(--dark);
            padding: 3rem;
            border-radius: 10px;
            max-width: 500px;
            width: 90%;
            text-align: center;
            position: relative;
        }
        .modal-content h2 {
            color: var(--gold);
            margin-bottom: 2rem;
            font-size: 1.8rem;
        }
        #asset-code {
            width: 100%;
            padding: 1rem;
            margin-bottom: 1.5rem;
            background: var(--bg);
            border: 2px solid var(--gold);
            color: var(--text);
            border-radius: 5px;
            font-size: 1.1rem;
            text-align: center;
        }
        .zapsign-btn, .close-modal {
            padding: 1rem 2rem;
            border: none;
            border-radius: 5px;
            font-weight: 500;
            margin: 0 0.5rem;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
            font-size: 1rem;
        }
        #zapsign-btn {
            background: #25D366;
            color: white;
        }
        #zapsign-btn:hover {
            background: #20ba5a;
        }
        .close-modal {
            background: var(--gold);
            color: var(--bg);
        }
        .close-modal:hover {
            background: var(--gold-dark);
        }
        @media (max-width: 768px) {
            .hero-title {
                font-size: 2.2rem;
            }
            .filters {
                flex-direction: column;
                align-items: stretch;
            }
            .filters select, .filters .filter-btn {
                flex: 1;
            }
            .grid {
                grid-template-columns: 1fr;
                padding: 1rem;
                gap: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <button class="back-btn" onclick="window.history.back()">← Voltar</button>
    </header>

    <section class="hero">
        <h1 class="hero-title">Mesa de Originação Jurídica</h1>
        <p class="hero-desc">Descubra teses jurídicas estruturadas para otimizar sua estratégia de investimento.</p>
    </section>

    <div class="filters">
        <select id="state">
            <option value="">Todos Estados</option>
            <option value="SP">SP</option>
            <option value="RJ">RJ</option>
            <option value="MG">MG</option>
        </select>
        <select id="city">
            <option value="">Todas Cidades</option>
            <option value="São Paulo">São Paulo</option>
            <option value="Rio de Janeiro">Rio de Janeiro</option>
            <option value="Belo Horizonte">Belo Horizonte</option>
        </select>
        <select id="value">
            <option value="">Todos Valores</option>
            <option value="&lt;1M">&lt; 1M</option>
            <option value="1M-5M">1M - 5M</option>
            <option value=">5M">&gt; 5M</option>
        </select>
        <button id="filter-btn" class="filter-btn">Filtrar</button>
    </div>

    <div class="counter">
        Exibindo <span id="current">6</span> de <span id="total">150</span> teses estruturadas.
    </div>

    <div class="grid" id="grid">
        <!-- Cards will be generated by JS -->
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <h2>Protocolo de Acesso</h2>
            <input type="text" id="asset-code" placeholder="Código do Ativo" readonly>
            <div>
                <button id="zapsign-btn" class="zapsign-btn">ZapSign</button>
                <button id="close-modal" class="close-modal">Fechar</button>
            </div>
        </div>
    </div>

    <script>
        const TOTAL_THESES = 150;
        const data = [
            {
                id: 1,
                title: "Tese Imobiliária SP Centro",
                desc: "Estruturação de fundo para aquisição de imóveis comerciais no centro de SP com garantia real.",
                state: "SP",
                city: "São Paulo",
                value: "1M-5M",
                valueDisplay: "1M - 5M",
                assetCode: "SP-CENTRO-001"
            },
            {
                id: 2,
                title: "Desenvolvimento Residencial Barra RJ",
                desc: "Projeto de alto padrão na Barra da Tijuca com teses de funding acelerado.",
                state: "RJ",
                city: "Rio de Janeiro",
                value: ">5M",
                valueDisplay: "> 5M",
                assetCode: "RJ-BARRA-001"
            },
            {
                id: 3,
                title: "Galpões Logísticos MG",
                desc: "Investimento em logística industrial em Betim com estrutura securitizada.",
                state: "MG",
                city: "Belo Horizonte",
                value: "<1M",
                valueDisplay: "< 1M",
                assetCode: "MG-LOG-001"
            },
            {
                id: 4,
                title: "Shoppings SP",
                desc: "Revitalização de shopping centers com lastro imobiliário.",
                state: "SP",
                city: "São Paulo",
                value: ">5M",
                valueDisplay: "> 5M",
                assetCode: "SP-SHOP-001"
            },
            {
                id: 5,
                title: "Loteamentos RJ",
                desc: "Urbanização de loteamentos na zona norte.",
                state: "RJ",
                city: "Rio de Janeiro",
                value: "1M-5M",
                valueDisplay: "1M - 5M",
                assetCode: "RJ-LOTE-001"
            },
            {
                id: 6,
                title: "Hotéis MG",
                desc: "Rede hoteleira em Poços de Caldas com estrutura jurídica inovadora.",
                state: "MG",
                city: "Belo Horizonte",
                value: "<1M",
                valueDisplay: "< 1M",
                assetCode: "MG-HOTEL-001"
            }
        ];

        let filteredData = data;
        const modal = document.getElementById('modal');
        const grid = document.getElementById('grid');

        function renderGrid(thesesToRender) {
            grid.innerHTML = '';
            thesesToRender.forEach(t => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <h3>${t.title}</h3>
                    <p>${t.desc}</p>
                    <div class="meta">
                        <span>${t.state}</span> |
                        <span>${t.city}</span> |
                        <span>R$ ${t.valueDisplay}</span>
                    </div>
                    <button class="access-btn" data-asset="${t.assetCode}">Acessar Protocolo</button>
                `;
                grid.appendChild(card);
            });
            document.getElementById('current').textContent = thesesToRender.length;
            document.getElementById('total').textContent = TOTAL_THESES;
        }

        grid.addEventListener('click', (e) => {
            if (e.target.classList.contains('access-btn')) {
                const assetCode = e.target.dataset.asset;
                document.getElementById('asset-code').value = assetCode;
                modal.classList.add('active');
            }
        });

        function applyFilters() {
            const state = document.getElementById('state').value;
            const city = document.getElementById('city').value;
            const valueFilter = document.getElementById('value').value;
            filteredData = data.filter(t => 
                (state === '' || t.state === state) &&
                (city === '' || t.city === city) &&
                (valueFilter === '' || t.value === valueFilter)
            );
            renderGrid(filteredData);
        }

        document.getElementById('filter-btn').onclick = applyFilters;

        document.getElementById('close-modal').onclick = () => {
            modal.classList.remove('active');
            document.getElementById('asset-code').value = '';
        };

        document.getElementById('zapsign-btn').onclick = () => {
            const code = document.getElementById('asset-code').value.trim();
            if (code) {
                alert(`Protocolo de acesso para o ativo ${code} foi enviado via ZapSign!`);
                modal.classList.remove('active');
                document.getElementById('asset-code').value = '';
            } else {
                alert('Por favor, insira o código do ativo.');
            }
        };

        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                modal.classList.remove('active');
                document.getElementById('asset-code').value = '';
            }
        });

        // Initialize
        renderGrid(data);
    </script>
</body>
</html>
