<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artigos Técnicos | Victor Prata</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,500;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        /* Reutilizando o DNA visual que já criamos */
        :root { --gold: #c6a85a; --dark: #0a0c10; --text-soft: #a0a0a0; --border: rgba(198, 168, 90, 0.2); }
        body { background-color: var(--dark); color: #f0f0f0; font-family: 'Montserrat', sans-serif; margin: 0; }
        .container { max-width: 900px; margin: 0 auto; padding: 0 25px; }
        nav { padding: 30px 0; display: flex; justify-content: space-between; border-bottom: 1px solid var(--border); }
        .nav-logo { font-family: 'Playfair Display', serif; color: var(--gold); text-decoration: none; font-weight: 700; }
        
        header { padding: 80px 0 50px 0; text-align: center; }
        h1 { font-family: 'Playfair Display', serif; font-size: 2.5rem; }

        .blog-list { margin-top: 50px; }
        .blog-item { 
            display: block; 
            text-decoration: none; 
            padding: 30px; 
            border: 1px solid var(--border); 
            margin-bottom: 20px; 
            transition: 0.3s;
        }
        .blog-item:hover { border-color: var(--gold); background: rgba(198, 168, 90, 0.05); }
        .blog-item h2 { margin: 0 0 10px 0; color: #fff; font-family: 'Playfair Display', serif; font-size: 1.5rem; }
        .blog-item p { margin: 0; color: var(--text-soft); font-size: 0.95rem; line-height: 1.5; }
        .blog-item .date { color: var(--gold); font-size: 12px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; display: block; }
    </style>
</head>
<body>
    <div class="container">
        <nav>
            <a href="/" class="nav-logo">VICTOR PRATA</a>
            <a href="/" style="color: var(--text-soft); text-decoration: none; font-size: 13px;">VOLTAR PARA HOME</a>
        </nav>

        <header>
            <h1>Artigos e Análises</h1>
            <p style="color: var(--text-soft);">Perspectiva técnica sobre leilões judiciais e segurança jurídica.</p>
        </header>

        <div class="blog-list">
            <a href="/blog/desagio-nao-decide.html" class="blog-item">
                <span class="date">03 Mar 2026</span>
                <h2>Deságio Não Decide: A Ilusão do Desconto</h2>
                <p>Por que focar apenas no desconto pode esconder riscos que inviabilizam o lucro da operação.</p>
            </a>

            </div>
    </div>
</body>
</html>
